when:
  - event: [push, pull_request]

steps:
  # ── CI: tests + type-check ──

  - name: test
    image: node:22-slim
    commands:
      - npm ci
      - npm run typecheck
      - npm test

  # ── Deploy: Docker images via BuildKit (push to main only) ──

  - name: build-orchestrator
    image: moby/buildkit:v0.21.1
    when:
      - event: push
        branch: main
    depends_on:
      - test
    commands:
      - >
        buildctl
        --addr tcp://buildkitd.infra.svc.cluster.local:1234
        build
        --frontend dockerfile.v0
        --local context=.
        --local dockerfile=packages/orchestrator
        --output type=image,name=172.20.0.161:30500/claude-agent-runner/orchestrator:latest,push=true,registry.insecure=true

  - name: build-runner
    image: moby/buildkit:v0.21.1
    when:
      - event: push
        branch: main
    depends_on:
      - test
    commands:
      - >
        buildctl
        --addr tcp://buildkitd.infra.svc.cluster.local:1234
        build
        --frontend dockerfile.v0
        --local context=.
        --local dockerfile=packages/runner
        --output type=image,name=172.20.0.161:30500/claude-agent-runner/runner:latest,push=true,registry.insecure=true
