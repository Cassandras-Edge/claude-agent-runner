when:
  - event: [push, pull_request]

steps:
  # ── CI: tests + type-check ──

  - name: test
    image: node:22-slim
    commands:
      - apt-get update && apt-get install -y python3 make g++ --no-install-recommends
      - npm ci
      - npm run typecheck
      - npm test

  # ── Deploy: Docker images via BuildKit (push to main only) ──

  - name: build-orchestrator
    image: moby/buildkit:v0.21.1
    when:
      - event: push
        branch: main
    depends_on:
      - test
    commands:
      - >
        buildctl
        --addr tcp://buildkitd.infra.svc.cluster.local:1234
        build
        --frontend dockerfile.v0
        --local context=.
        --local dockerfile=packages/orchestrator
        --output type=image,name=registry.infra.svc.cluster.local:5000/claude-agent-runner/orchestrator:latest,push=true,registry.insecure=true

  - name: build-runner
    image: moby/buildkit:v0.21.1
    when:
      - event: push
        branch: main
    depends_on:
      - test
    commands:
      - >
        buildctl
        --addr tcp://buildkitd.infra.svc.cluster.local:1234
        build
        --frontend dockerfile.v0
        --local context=.
        --local dockerfile=packages/runner
        --opt build-arg:CLAUDE_CODE_VERSION=2.1.81
        --output type=image,name=registry.infra.svc.cluster.local:5000/claude-agent-runner/runner:latest,push=true,registry.insecure=true

  # ── Deploy: restart orchestrator to pick up new images ──

  - name: deploy
    image: node:22-slim
    when:
      - event: push
        branch: main
    depends_on:
      - build-orchestrator
      - build-runner
    backend_options:
      kubernetes:
        serviceAccountName: woodpecker-deploy
    commands:
      - >
        apt-get update && apt-get install -y --no-install-recommends curl ca-certificates &&
        curl -sLO "https://dl.k8s.io/release/v1.31.0/bin/linux/amd64/kubectl" &&
        chmod +x kubectl && mv kubectl /usr/local/bin/
      - kubectl -n production rollout restart deployment claude-orchestrator
      - kubectl -n production rollout status deployment claude-orchestrator --timeout=120s
