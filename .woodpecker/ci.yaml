when:
  - event: [push, pull_request]

steps:
  # ── CI: tests + type-check ──

  - name: test
    image: node:22-slim
    commands:
      - npm ci
      - npm run typecheck
      - npm test

  # ── Deploy: Docker images (push to main only) ──

  - name: build-orchestrator
    image: gcr.io/kaniko-project/executor:debug
    when:
      - event: push
        branch: main
    depends_on:
      - test
    commands:
      - >
        /kaniko/executor
        --dockerfile=packages/orchestrator/Dockerfile
        --context=.
        --destination=172.20.0.161:30500/claude-agent-runner/orchestrator:latest
        --destination=172.20.0.161:30500/claude-agent-runner/orchestrator:main-${CI_COMMIT_SHA:0:7}
        --insecure
        --cache=true
        --cache-repo=172.20.0.161:30500/claude-agent-runner/orchestrator-cache
        --compressed-caching=false
        --insecure-registry=172.20.0.161:30500

  - name: build-runner
    image: gcr.io/kaniko-project/executor:debug
    when:
      - event: push
        branch: main
    depends_on:
      - test
    commands:
      - >
        /kaniko/executor
        --dockerfile=packages/runner/Dockerfile
        --context=.
        --destination=172.20.0.161:30500/claude-agent-runner/runner:latest
        --destination=172.20.0.161:30500/claude-agent-runner/runner:main-${CI_COMMIT_SHA:0:7}
        --insecure
        --cache=true
        --cache-copy-layers
        --cache-repo=172.20.0.161:30500/claude-agent-runner/runner-cache
        --compressed-caching=false
        --insecure-registry=172.20.0.161:30500
