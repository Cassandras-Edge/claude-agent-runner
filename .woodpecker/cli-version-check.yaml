# CLI Version Check — cron pipeline (configure cron "0 9 * * *" in Woodpecker UI)
# Checks npm for new Claude Code CLI versions, tests patches, creates PR or issue.
when:
  - event: cron
    cron: cli-version-check

steps:
  - name: check-and-update
    image: node:22-slim
    environment:
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      - apt-get update && apt-get install -y git curl
      - curl -fsSL https://bun.sh/install | bash
      - export PATH="$HOME/.bun/bin:$PATH"
      - |
        # Get current pinned version from Dockerfile
        CURRENT=$(grep -oP '@anthropic-ai/claude-code@\K[0-9.]+' packages/runner/Dockerfile | head -1)
        echo "Current: $CURRENT"

        # Get latest version from npm
        LATEST=$(npm view @anthropic-ai/claude-code version 2>/dev/null)
        echo "Latest: $LATEST"

        if [ "$CURRENT" = "$LATEST" ]; then
          echo "Already up to date."
          exit 0
        fi

        echo "New version available: $CURRENT -> $LATEST"

        # Download new CLI
        npm pack @anthropic-ai/claude-code@$LATEST --pack-destination /tmp
        mkdir -p /tmp/claude-code
        tar xzf /tmp/anthropic-ai-claude-code-*.tgz -C /tmp/claude-code

        CLI_PATH="/tmp/claude-code/package/cli.js"
        if [ ! -f "$CLI_PATH" ]; then
          echo "cli.js not found"
          exit 1
        fi

        # Copy snapshot
        cp "$CLI_PATH" "packages/runner/patches/snapshots/cli-$LATEST.js"

        # Test patches
        cd packages/runner/patches
        PATCH_OUTPUT=$(bun run scripts/patch-all.js --binary "snapshots/cli-$LATEST.js" --js-only --dry-run 2>&1) || true
        echo "$PATCH_OUTPUT"
        cd ../../..

        FAILED=$(echo "$PATCH_OUTPUT" | grep "SKIP:" | sed 's/.*SKIP: //' | sed 's/ —.*//' || true)

        # Configure git for GitHub API
        git config user.name "woodpecker-ci[bot]"
        git config user.email "woodpecker-ci[bot]@users.noreply.github.com"

        if [ -z "$FAILED" ]; then
          echo "All patches passed! Creating update branch and PR."

          git checkout -b "cli-update/v$LATEST"

          # Update Dockerfile
          sed -i "s/@anthropic-ai\/claude-code@$CURRENT/@anthropic-ai\/claude-code@$LATEST/g" packages/runner/Dockerfile
          sed -i "s/cli-$CURRENT/cli-$LATEST/g" packages/runner/patches/__tests__/engine.test.js

          git add -A
          git commit -m "Update Claude Code CLI to v$LATEST

        All patches verified compatible via dry-run."

          git remote set-url origin "https://x-access-token:$GITHUB_TOKEN@github.com/$CI_REPO.git"
          git push origin "cli-update/v$LATEST"

          # Create PR via GitHub API
          curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/$CI_REPO/pulls" \
            -d "{
              \"title\": \"Update Claude Code CLI to v$LATEST\",
              \"body\": \"## Summary\\n- Updates pinned CLI from v$CURRENT to v$LATEST\\n- All patches verified compatible\\n\\nGenerated by Woodpecker CLI version check.\",
              \"head\": \"cli-update/v$LATEST\",
              \"base\": \"main\"
            }"
        else
          echo "Patches failed: $FAILED"
          echo "Creating issue for manual investigation."

          # Create issue via GitHub API
          curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/$CI_REPO/issues" \
            -d "{
              \"title\": \"Claude Code v$LATEST: patch compatibility issue\",
              \"body\": \"## Claude Code v$LATEST Released\\n\\n**Current:** v$CURRENT\\n**New:** v$LATEST\\n**Failed patches:** $FAILED\\n\\n\`\`\`\\n$PATCH_OUTPUT\\n\`\`\`\\n\\nGenerated by Woodpecker CLI version check.\",
              \"labels\": [\"cli-update\", \"patches-broken\"]
            }"
        fi
