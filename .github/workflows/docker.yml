name: CI / Docker

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Test
    runs-on: gh-arc-claude-agent-runner
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

  validate-manifests:
    name: Validate k8s manifests
    runs-on: gh-arc-claude-agent-runner
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Validate main manifests
        run: kubectl kustomize k8s/ > /dev/null

      - name: Validate monitoring manifests
        run: kubectl kustomize k8s/monitoring/ > /dev/null

  build:
    name: Build ${{ matrix.image }}
    runs-on: gh-arc-claude-agent-runner
    needs: [test, validate-manifests]
    if: github.event_name == 'push'
    strategy:
      matrix:
        include:
          - image: orchestrator
            dockerfile: packages/orchestrator/Dockerfile
          - image: runner
            dockerfile: packages/runner/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: 172.20.0.161:30500/claude-agent-runner/${{ matrix.image }}
          tags: |
            # Version tags: v1.2.3 → 1.2.3 and v1.2
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # Raw tag matching the git tag (e.g. v1.2.3)
            type=ref,event=tag
            # latest on main and on any version tag
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') }}
            # main-<short-sha> on pushes to main only
            type=raw,value=main-${{ steps.sha.outputs.short }},enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
