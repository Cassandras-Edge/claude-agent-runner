apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: claude-sessions
  namespace: claude-runner
spec:
  accessModes:
    # RWO for single-node k3s (local-path). Change to ReadWriteMany for multi-node (requires NFS/Longhorn).
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  # Use default StorageClass (local-path for k3s, or specify explicitly)
  # storageClassName: longhorn
