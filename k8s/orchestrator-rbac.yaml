apiVersion: v1
kind: ServiceAccount
metadata:
  name: claude-orchestrator
  namespace: claude-runner
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: claude-orchestrator
  namespace: claude-runner
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create", "get", "list", "delete", "patch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: claude-orchestrator
  namespace: claude-runner
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: claude-orchestrator
subjects:
  - kind: ServiceAccount
    name: claude-orchestrator
    namespace: claude-runner
