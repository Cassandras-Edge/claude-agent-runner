services:
  orchestrator:
    build:
      context: .
      dockerfile: packages/orchestrator/Dockerfile
    container_name: claude-orchestrator
    ports:
      - "9080:8080"
      - "9081:8081"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - claude-sessions:/data/sessions:ro
      - claude-orchestrator-data:/app/data
    env_file:
      - .env
    environment:
      - RUNNER_IMAGE=claude-runner:latest
      - DOCKER_NETWORK=claude-net
      - IDLE_TIMEOUT_MS=300000
      - MESSAGE_TIMEOUT_MS=600000
      - CLEANUP_RUNNERS_ON_EXIT=false
      - MAX_ACTIVE_SESSIONS=8
      - ORCHESTRATOR_HOST=claude-orchestrator
      - SESSIONS_VOLUME=claude-sessions
      - SESSIONS_PATH=/data/sessions
      - DB_PATH=/app/data/orchestrator.db
      - VAULTS_VOLUME=vaults-data
      - VAULT_SYNC_IMAGE=vault-sync:latest
      - WARM_POOL_SIZE=1
    networks:
      - claude-net
    restart: unless-stopped

  vault-sync:
    build:
      context: .
      dockerfile: packages/orchestrator/Dockerfile.vault-sync
    image: vault-sync:latest
    profiles:
      - build-only

volumes:
  claude-sessions:
    name: claude-sessions
  claude-orchestrator-data:
    name: claude-orchestrator-data
  vaults-data:
    name: vaults-data

networks:
  claude-net:
    name: claude-net
    driver: bridge
