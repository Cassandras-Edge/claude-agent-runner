openapi: 3.1.0
info:
  title: Claude Agent Runner
  description: REST API for the claude-agent-runner orchestrator
  version: 2.1.0

servers:
  - url: http://localhost:9080
    description: Local development

paths:
  /health:
    get:
      operationId: getHealth
      summary: Get orchestrator health
      responses:
        "200":
          description: Health information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthInfo"

  /metrics:
    get:
      operationId: getMetrics
      summary: Get Prometheus metrics
      responses:
        "200":
          description: Prometheus exposition format
          content:
            text/plain:
              schema:
                type: string

  /sessions:
    get:
      operationId: listSessions
      summary: List sessions
      responses:
        "200":
          description: Sessions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionListResponse"
    post:
      operationId: createSession
      summary: Create a session, optionally sending the first message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionRequest"
      responses:
        "200":
          description: Session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSessionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/CapacityReached"
        "500":
          $ref: "#/components/responses/ServerError"

  /sessions/{session_id}:
    parameters:
      - $ref: "#/components/parameters/SessionId"
    get:
      operationId: getSession
      summary: Get session detail
      responses:
        "200":
          description: Session detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionDetail"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateSession
      summary: Update session name and pin state
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionUpdateRequest"
      responses:
        "200":
          description: Session updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionUpdateResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
    delete:
      operationId: deleteSession
      summary: Stop and remove a session
      responses:
        "200":
          description: Session removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StopSessionResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /sessions/{session_id}/stop:
    parameters:
      - $ref: "#/components/parameters/SessionId"
    post:
      operationId: stopSession
      summary: Stop a session without deleting metadata
      responses:
        "200":
          description: Session stopped
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StopSessionResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /sessions/{session_id}/resume:
    parameters:
      - $ref: "#/components/parameters/SessionId"
    post:
      operationId: resumeSession
      summary: Resume a stopped session
      responses:
        "200":
          description: Session resumed or already active
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResumeSessionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"

  /sessions/{session_id}/transcript:
    parameters:
      - $ref: "#/components/parameters/SessionId"
    get:
      operationId: getTranscript
      summary: Get transcript
      parameters:
        - name: format
          in: query
          required: false
          schema:
            type: string
            enum: [json]
      responses:
        "200":
          description: Transcript JSON or raw JSONL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TranscriptResponse"
            application/x-ndjson:
              schema:
                type: string
        "404":
          $ref: "#/components/responses/NotFound"

  /sessions/{session_id}/messages:
    parameters:
      - $ref: "#/components/parameters/SessionId"
    post:
      operationId: sendMessage
      summary: Send a blocking follow-up message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageRequest"
      responses:
        "200":
          description: Assistant response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/SessionBusy"
        "410":
          $ref: "#/components/responses/SessionStopped"
        "500":
          $ref: "#/components/responses/ServerError"

  /sessions/{session_id}/fork:
    parameters:
      - $ref: "#/components/parameters/SessionId"
    post:
      operationId: forkSession
      summary: Fork a session from persisted SDK state
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForkRequest"
      responses:
        "200":
          description: Forked session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForkResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/CapacityReached"
        "500":
          $ref: "#/components/responses/ServerError"

  /sessions/{session_id}/context:
    parameters:
      - $ref: "#/components/parameters/SessionId"
    get:
      operationId: getContext
      summary: Get current runner context
      responses:
        "200":
          description: Live context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContextResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/SessionBusy"
        "410":
          $ref: "#/components/responses/SessionStopped"
        "503":
          $ref: "#/components/responses/RunnerUnavailable"

  /sessions/{session_id}/context/compact:
    parameters:
      - $ref: "#/components/parameters/SessionId"
    post:
      operationId: scheduleCompaction
      summary: Schedule context compaction on the next query
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContextCompactRequest"
      responses:
        "200":
          description: Compaction scheduled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContextCompactResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "410":
          $ref: "#/components/responses/SessionStopped"
        "503":
          $ref: "#/components/responses/RunnerUnavailable"

  /sessions/{session_id}/context/inject:
    parameters:
      - $ref: "#/components/parameters/SessionId"
    post:
      operationId: injectContextMessage
      summary: Inject a synthetic context message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContextInjectRequest"
      responses:
        "200":
          description: Inject result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContextMutationResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/SessionBusy"
        "410":
          $ref: "#/components/responses/SessionStopped"
        "503":
          $ref: "#/components/responses/RunnerUnavailable"

  /sessions/{session_id}/context/messages/{uuid}:
    parameters:
      - $ref: "#/components/parameters/SessionId"
      - $ref: "#/components/parameters/ContextMessageUuid"
    delete:
      operationId: removeContextMessage
      summary: Remove a context message by UUID
      responses:
        "200":
          description: Remove result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContextMutationResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/SessionBusy"
        "410":
          $ref: "#/components/responses/SessionStopped"
        "503":
          $ref: "#/components/responses/RunnerUnavailable"

  /sessions/{session_id}/context/truncate:
    parameters:
      - $ref: "#/components/parameters/SessionId"
    post:
      operationId: truncateContext
      summary: Truncate context to the last N turns
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContextTruncateRequest"
      responses:
        "200":
          description: Truncate result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContextMutationResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/SessionBusy"
        "410":
          $ref: "#/components/responses/SessionStopped"
        "503":
          $ref: "#/components/responses/RunnerUnavailable"

  /sessions/{session_id}/context/steer:
    parameters:
      - $ref: "#/components/parameters/SessionId"
    post:
      operationId: steerSession
      summary: Steer or fork-and-steer a running session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SteerRequest"
      responses:
        "200":
          description: Steer accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SteerResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "410":
          $ref: "#/components/responses/SessionStopped"
        "503":
          $ref: "#/components/responses/RunnerUnavailable"

  /sessions/{session_id}/snapshots:
    parameters:
      - $ref: "#/components/parameters/SessionId"
    get:
      operationId: listSnapshots
      summary: List context snapshots for a session
      responses:
        "200":
          description: Snapshot list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SnapshotListResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      operationId: createSnapshot
      summary: Create a manual context snapshot
      responses:
        "200":
          description: Snapshot created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SnapshotDetail"
        "404":
          $ref: "#/components/responses/NotFound"
        "410":
          $ref: "#/components/responses/SessionStopped"
        "503":
          $ref: "#/components/responses/RunnerUnavailable"

  /sessions/{session_id}/snapshots/{snapshot_id}:
    parameters:
      - $ref: "#/components/parameters/SessionId"
      - $ref: "#/components/parameters/SnapshotId"
    get:
      operationId: getSnapshot
      summary: Get a snapshot with full message payloads
      responses:
        "200":
          description: Snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SnapshotDetail"
        "404":
          $ref: "#/components/responses/NotFound"

  /sessions/{session_id}/generate-title:
    parameters:
      - $ref: "#/components/parameters/SessionId"
    post:
      operationId: generateTitle
      summary: Generate a short title using a warm Haiku runner
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateTitleRequest"
      responses:
        "200":
          description: Title generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateTitleResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"

  /sessions/{session_id}/suggest-folder:
    parameters:
      - $ref: "#/components/parameters/SessionId"
    post:
      operationId: suggestFolder
      summary: Suggest an existing or new folder for a note
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SuggestFolderRequest"
      responses:
        "200":
          description: Folder suggestion
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuggestFolderResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"

  /tenants:
    get:
      operationId: listTenants
      summary: List tenants
      responses:
        "200":
          description: Tenants
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantListResponse"
    post:
      operationId: createTenant
      summary: Create a tenant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTenantRequest"
      responses:
        "201":
          description: Tenant created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateTenantResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"

  /tenants/{tenant_id}:
    parameters:
      - $ref: "#/components/parameters/TenantId"
    get:
      operationId: getTenant
      summary: Get tenant detail
      responses:
        "200":
          description: Tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantInfo"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateTenant
      summary: Update tenant settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTenantRequest"
      responses:
        "200":
          description: Tenant updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantUpdateResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteTenant
      summary: Delete a tenant
      responses:
        "200":
          description: Tenant deleted
          content:
            application/json:
              schema:
                type: object
                required: [deleted]
                properties:
                  deleted:
                    type: boolean
        "404":
          $ref: "#/components/responses/NotFound"

  /tenants/{tenant_id}/rotate-key:
    parameters:
      - $ref: "#/components/parameters/TenantId"
    post:
      operationId: rotateTenantKey
      summary: Rotate a tenant API key
      responses:
        "200":
          description: New API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RotateTenantKeyResponse"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  parameters:
    SessionId:
      name: session_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SnapshotId:
      name: snapshot_id
      in: path
      required: true
      schema:
        type: integer
    ContextMessageUuid:
      name: uuid
      in: path
      required: true
      schema:
        type: string
    TenantId:
      name: tenant_id
      in: path
      required: true
      schema:
        type: string

  schemas:
    Model:
      type: string
      enum: [haiku, sonnet, "sonnet[1m]", opus, "opus[1m]"]

    SessionStatus:
      type: string
      enum: [starting, cloning, syncing, ready, busy, idle, stopped, error]

    ErrorCode:
      type: string
      enum:
        - invalid_request
        - clone_failed
        - container_failed
        - agent_error
        - timeout
        - session_capacity_reached
        - session_not_found
        - session_busy
        - session_stopped
        - internal

    Usage:
      type: object
      required: [input_tokens, output_tokens, cost_usd, duration_ms]
      properties:
        input_tokens:
          type: integer
        output_tokens:
          type: integer
        cost_usd:
          type: number
        duration_ms:
          type: number

    UsageTotals:
      type: object
      required: [input_tokens, output_tokens, cost_usd]
      properties:
        input_tokens:
          type: integer
        output_tokens:
          type: integer
        cost_usd:
          type: number

    SessionSource:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [repo, workspace, vault, ephemeral]
        repo:
          type: string
        branch:
          type: string
        workspace:
          type: string
        vault:
          type: string

    McpServerConfig:
      type: object
      required: [command]
      properties:
        command:
          type: string
        args:
          type: array
          items:
            type: string
        env:
          type: object
          additionalProperties:
            type: string

    SessionRequest:
      type: object
      properties:
        name:
          type: string
        pinned:
          type: boolean
        agentId:
          type: string
        repo:
          type: string
        branch:
          type: string
        workspace:
          type: string
        vault:
          type: string
        message:
          type: string
        model:
          $ref: "#/components/schemas/Model"
        systemPrompt:
          type: string
        appendSystemPrompt:
          type: string
        maxTurns:
          type: integer
        thinking:
          type: boolean
        allowedTools:
          type: array
          items:
            type: string
        disallowedTools:
          type: array
          items:
            type: string
        additionalDirectories:
          type: array
          items:
            type: string
        compactInstructions:
          type: string
        permissionMode:
          type: string
        mcpServers:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/McpServerConfig"
        allowedPaths:
          type: array
          items:
            type: string

    CreateSessionResponse:
      type: object
      required: [session_id]
      properties:
        session_id:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/SessionStatus"
        result:
          type: string
        usage:
          $ref: "#/components/schemas/Usage"

    MessageRequest:
      type: object
      required: [message]
      properties:
        message:
          type: string
        model:
          type: string
        maxTurns:
          type: integer

    MessageResponse:
      type: object
      required: [result, usage]
      properties:
        result:
          type: string
        usage:
          $ref: "#/components/schemas/Usage"

    ForkRequest:
      type: object
      properties:
        resumeAt:
          type: string
        message:
          type: string
        model:
          type: string
        systemPrompt:
          type: string
        appendSystemPrompt:
          type: string
        maxTurns:
          type: integer
        pinned:
          type: boolean

    ForkResponse:
      type: object
      required: [session_id]
      properties:
        session_id:
          type: string
          format: uuid
        forked_from:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/SessionStatus"
        result:
          type: string
        usage:
          $ref: "#/components/schemas/Usage"

    SessionInfo:
      type: object
      required: [session_id, status, source, model, created_at, last_activity, message_count]
      properties:
        session_id:
          type: string
          format: uuid
        name:
          type: string
        pinned:
          type: boolean
        agent_id:
          type: string
        status:
          $ref: "#/components/schemas/SessionStatus"
        source:
          $ref: "#/components/schemas/SessionSource"
        model:
          type: string
        created_at:
          type: string
          format: date-time
        last_activity:
          type: string
          format: date-time
        message_count:
          type: integer

    SessionDetail:
      allOf:
        - $ref: "#/components/schemas/SessionInfo"
        - type: object
          properties:
            total_usage:
              $ref: "#/components/schemas/UsageTotals"
            error:
              type: string
            container_id:
              type: string
            sdk_session_id:
              type: string
            forked_from:
              type: string
              format: uuid
            context_tokens:
              type: integer
            compact_count:
              type: integer
            last_compact_at:
              type: string
              format: date-time

    SessionListResponse:
      type: object
      required: [sessions]
      properties:
        sessions:
          type: array
          items:
            $ref: "#/components/schemas/SessionInfo"

    SessionUpdateRequest:
      type: object
      properties:
        name:
          type: string
        pinned:
          type: boolean

    SessionUpdateResponse:
      type: object
      required: [session_id]
      properties:
        session_id:
          type: string
          format: uuid
        name:
          type: string
        pinned:
          type: boolean

    StopSessionResponse:
      type: object
      required: [session_id, status, total_usage]
      properties:
        session_id:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/SessionStatus"
        total_usage:
          $ref: "#/components/schemas/UsageTotals"

    ResumeSessionResponse:
      type: object
      required: [session_id]
      properties:
        session_id:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/SessionStatus"
        resumed:
          type: boolean

    TranscriptResponse:
      type: object
      required: [session_id, events]
      properties:
        session_id:
          type: string
          format: uuid
        events:
          type: array
          items:
            type: object
            additionalProperties: true

    ContextMessage:
      type: object
      required: [uuid, parentUuid, type, content]
      properties:
        uuid:
          type: string
        parentUuid:
          type: [string, "null"]
        type:
          type: string
          enum: [user, assistant, system]
        content:
          description: Raw SDK message payload
        timestamp:
          type: string

    ContextStats:
      type: object
      required: [message_count, turn_count, type_breakdown, estimated_tokens]
      properties:
        message_count:
          type: integer
        turn_count:
          type: integer
        type_breakdown:
          type: object
          additionalProperties:
            type: integer
        estimated_tokens:
          type: integer

    ContextResponse:
      type: object
      required: [session_id, messages]
      properties:
        session_id:
          type: string
          format: uuid
        messages:
          type: array
          items:
            $ref: "#/components/schemas/ContextMessage"
        stats:
          $ref: "#/components/schemas/ContextStats"
        context_tokens:
          type: integer
        compact_count:
          type: integer
        last_compact_at:
          type: string
          format: date-time

    ContextCompactRequest:
      type: object
      properties:
        custom_instructions:
          type: string

    ContextCompactResponse:
      type: object
      required: [session_id, scheduled, message]
      properties:
        session_id:
          type: string
          format: uuid
        scheduled:
          type: boolean
        message:
          type: string

    ContextInjectRequest:
      type: object
      required: [content, role]
      properties:
        content:
          type: string
        role:
          type: string
          enum: [user, system]
        after_uuid:
          type: string

    ContextTruncateRequest:
      type: object
      required: [keep_last_n]
      properties:
        keep_last_n:
          type: integer
          minimum: 1

    ContextMutationResponse:
      type: object
      required: [session_id]
      properties:
        session_id:
          type: string
          format: uuid
        injected_uuid:
          type: string
        removed_uuid:
          type: string
        truncated:
          type: boolean
        kept_turns:
          type: integer

    ContextOperation:
      oneOf:
        - type: object
          required: [op]
          properties:
            op:
              const: get_context
        - type: object
          required: [op]
          properties:
            op:
              const: get_stats
        - type: object
          required: [op, uuid]
          properties:
            op:
              const: remove_message
            uuid:
              type: string
        - type: object
          required: [op, content, role]
          properties:
            op:
              const: inject_message
            content:
              type: string
            role:
              type: string
              enum: [user, system]
            after_uuid:
              type: string
        - type: object
          required: [op, keep_last_n]
          properties:
            op:
              const: truncate
            keep_last_n:
              type: integer

    SteerRequest:
      type: object
      required: [message]
      properties:
        message:
          type: string
        mode:
          type: string
          enum: [steer, fork_and_steer]
        model:
          type: string
        maxTurns:
          type: integer
        compact:
          type: boolean
        compact_instructions:
          type: string
        operations:
          type: array
          items:
            $ref: "#/components/schemas/ContextOperation"

    SteerResponse:
      type: object
      required: [session_id, steered, mode, was_busy]
      properties:
        session_id:
          type: string
          format: uuid
        steered:
          type: boolean
        mode:
          type: string
          enum: [steer, fork_and_steer]
        was_busy:
          type: boolean

    SnapshotSummary:
      type: object
      required: [id, session_id, trigger, message_count, roles, created_at]
      properties:
        id:
          type: integer
        session_id:
          type: string
          format: uuid
        request_id:
          type: string
        trigger:
          type: string
          enum: [steer, compact, turn_complete, manual]
        message_count:
          type: integer
        roles:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time

    SnapshotDetail:
      allOf:
        - $ref: "#/components/schemas/SnapshotSummary"
        - type: object
          required: [messages]
          properties:
            messages:
              type: array
              items:
                type: object
                additionalProperties: true

    SnapshotListResponse:
      type: object
      required: [snapshots]
      properties:
        snapshots:
          type: array
          items:
            $ref: "#/components/schemas/SnapshotSummary"

    GenerateTitleRequest:
      type: object
      required: [userMessage]
      properties:
        userMessage:
          type: string
        assistantMessage:
          type: string

    GenerateTitleResponse:
      type: object
      required: [title]
      properties:
        title:
          type: string

    SuggestFolderRequest:
      type: object
      required: [title, preview, folders]
      properties:
        title:
          type: string
        preview:
          type: string
        folders:
          type: array
          items:
            type: string

    SuggestFolderResponse:
      type: object
      required: [type, folderName]
      properties:
        type:
          type: string
          enum: [existing, new]
        folderName:
          type: string

    HealthInfo:
      type: object
      required: [status, active_sessions, token_pool, uptime_ms, runner_image, docker_connected, max_active_sessions]
      properties:
        status:
          const: ok
        active_sessions:
          type: integer
        token_pool:
          type: object
          required: [size, usage]
          properties:
            size:
              type: integer
            usage:
              type: array
              items:
                type: object
                required: [tokenIndex, activeSessions]
                properties:
                  tokenIndex:
                    type: integer
                  activeSessions:
                    type: integer
        uptime_ms:
          type: integer
        runner_image:
          type: string
        docker_connected:
          type: boolean
        max_active_sessions:
          type: [integer, "null"]
        warm_pool:
          description: Warm pool stats when enabled

    TenantInfo:
      type: object
      required: [id, name, namespace, max_sessions, created_at]
      properties:
        id:
          type: string
        name:
          type: string
        namespace:
          type: string
        max_sessions:
          type: integer
        vault:
          type: string
        has_obsidian_auth:
          type: boolean
        has_git_token:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    TenantListResponse:
      type: object
      required: [tenants]
      properties:
        tenants:
          type: array
          items:
            $ref: "#/components/schemas/TenantInfo"

    CreateTenantRequest:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string
        namespace:
          type: string
        max_sessions:
          type: integer
        vault:
          type: string
        obsidian_auth_token:
          type: string
        obsidian_e2ee_password:
          type: string
        git_token:
          type: string

    CreateTenantResponse:
      allOf:
        - $ref: "#/components/schemas/TenantInfo"
        - type: object
          required: [api_key]
          properties:
            api_key:
              type: string

    UpdateTenantRequest:
      type: object
      properties:
        name:
          type: string
        max_sessions:
          type: integer
        vault:
          type: [string, "null"]
        obsidian_auth_token:
          type: [string, "null"]
        obsidian_e2ee_password:
          type: [string, "null"]
        git_token:
          type: [string, "null"]

    TenantUpdateResponse:
      type: object
      required: [id, name, max_sessions]
      properties:
        id:
          type: string
        name:
          type: string
        max_sessions:
          type: integer

    RotateTenantKeyResponse:
      type: object
      required: [id, api_key]
      properties:
        id:
          type: string
        api_key:
          type: string

    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          $ref: "#/components/schemas/ErrorCode"
        message:
          type: string
        session_id:
          type: string
          format: uuid

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Request conflicts with current state
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    CapacityReached:
      description: Session capacity reached
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    SessionBusy:
      description: Session is currently processing
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    SessionStopped:
      description: Session is stopped or errored
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    RunnerUnavailable:
      description: Runner is not connected
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
